# Enable mouse keys
CONFIG_ZMK_MOUSE=y

# Legacy 8-bit wheel reports — iOS pairs and consumes these more reliably
# than high-resolution smooth-scroll. Re-enable if iOS support improves.
# CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Enable rotary encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
